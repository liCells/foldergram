<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Foldergram" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Foldergram</title>
    <style>
      /* ── Splash screen — shown before Vue boots ──────────────────── */
      #fg-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #0a0e18;
        z-index: 99999;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }
      #fg-splash.fg-splash--out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .fg-splash__ring {
        position: absolute;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(99,102,241,0.22) 0%, rgba(139,92,246,0.08) 55%, transparent 72%);
        animation: fg-splash-pulse 1.8s ease-in-out infinite;
      }
      .fg-splash__logo {
        position: relative;
        width: 58px;
        height: 58px;
        filter: drop-shadow(0 0 20px rgba(139,92,246,0.6));
        animation: fg-splash-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      @keyframes fg-splash-pop {
        from { opacity: 0; transform: scale(0.72); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes fg-splash-pulse {
        0%, 100% { transform: scale(1);    opacity: 0.7; }
        50%       { transform: scale(1.6); opacity: 0.15; }
      }
    </style>
  </head>
  <body>
    <!-- Branded splash: visible immediately, removed once Vue mounts -->
    <div id="fg-splash" aria-hidden="true">
      <div class="fg-splash__ring"></div>
      <svg class="fg-splash__logo" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fgSplashGrad" x1="2" y1="2" x2="18" y2="18" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#6366F1" />
            <stop offset="50%"  stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#EC4899" />
          </linearGradient>
        </defs>
        <path
          d="M2 4.5A2.5 2.5 0 0 1 4.5 2h11A2.5 2.5 0 0 1 18 4.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 2 15.5v-11zM4.5 3A1.5 1.5 0 0 0 3 4.5v11A1.5 1.5 0 0 0 4.5 17h11a1.5 1.5 0 0 0 1.5-1.5v-11A1.5 1.5 0 0 0 15.5 3h-11zM5 6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6zm3 0H6v2h2V6zm-3 6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-2zm3 0H6v2h2v-2zm3-6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1V6zm3 0h-2v2h2V6zm-3 6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-2zm3 0h-2v2h2v-2z"
          fill="url(#fgSplashGrad)"
        />
      </svg>

    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Fade out splash once Vue has rendered its first element
      (function () {
        var splash = document.getElementById('fg-splash');
        var app = document.getElementById('app');
        if (!splash || !app) return;
        var observer = new MutationObserver(function () {
          if (app.childElementCount > 0) {
            observer.disconnect();
            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                splash.classList.add('fg-splash--out');
                setTimeout(function () {
                  if (splash.parentNode) splash.parentNode.removeChild(splash);
                }, 340);
              });
            });
          }
        });
        observer.observe(app, { childList: true });
      })();
    </script>
  </body>
</html>
